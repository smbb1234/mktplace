services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: car_mvp_backend
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./assets:/app/assets
    depends_on:
      - postgres
      - chroma
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: car_mvp_frontend
    env_file:
      - .env.docker
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./assets:/app/assets
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: car_mvp_postgres
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: car_mvp_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:sts
    container_name: car_mvp_portainer
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always

volumes:
  postgres_data:
  chroma_data:
  portainer_data:
